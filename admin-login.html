<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Phone Haven / Terminal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
          <link rel="icon" href="images/logo.jpeg" type="image/x-icon">

    <style>
        body {
            background-color: #020617;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .font-display {
            font-family: 'Outfit', sans-serif;
        }

        .lock-shadow {
            box-shadow: 0 0 50px -10px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6 selection:bg-indigo-500/30">
    <div class="w-full max-w-md">
        <div class="glass p-12 rounded-[3.5rem] lock-shadow relative overflow-hidden">
            <div
                class="absolute top-0 right-0 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2">
            </div>

            <div class="relative z-10 flex flex-col items-center">
                <div
                    class="size-20 bg-indigo-600 text-white rounded-[2rem] flex items-center justify-center mb-10 shadow-2xl shadow-indigo-600/40 rotate-12">
                    <span class="material-symbols-outlined text-4xl font-bold">lock</span>
                </div>

                <h1 class="font-display text-3xl font-black tracking-tight text-white mb-2">Bureau Terminal</h1>
                <p class="text-slate-500 text-xs font-black uppercase tracking-[0.3em] mb-12">Authorization Required</p>

                <form id="login-form" class="w-full space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Access
                            Signature</label>
                        <input type="password" id="password" required
                            class="w-full h-16 bg-white/5 border border-white/10 rounded-3xl px-8 text-white font-black tracking-widest focus:outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all text-center"
                            placeholder="••••••••">
                    </div>

                    <button type="submit"
                        class="w-full h-16 bg-white text-slate-900 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl hover:bg-slate-100 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                        Decrypt Dashboard
                    </button>

                    <p id="error-msg"
                        class="text-red-400 text-[10px] font-black uppercase tracking-widest text-center hidden">Access
                        Revoked: Invalid Signature</p>
                </form>
            </div>
        </div>

        <p class="text-center mt-12 text-[10px] font-black uppercase tracking-[0.4em] text-slate-700">© 2024 Phone Haven
            • Logistics Control</p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (password === 'Amsdq1234') {
                localStorage.setItem('admin_authenticated', 'true');
                window.location.href = 'admin-orders.html';
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('password').value = '';
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>

</html>
