        const stockStatus = document.getElementById('stock-status');
        const wilayaSelect = document.getElementById('wilaya');
        const communeSelect = document.getElementById('commune');
        const orderForm = document.getElementById('order-form');
        const confirmBtn = document.getElementById('confirm-btn');

        // Populate Wilayas
        Object.keys(wilayasData).forEach(id => {
            const w = wilayasData[id];
            const option = document.createElement('option');
            option.value = w.name;
            option.textContent = `${w.code} - ${w.name} (${w.nameAr})`;
            wilayaSelect.appendChild(option);
        });

        let allCommunes = [];

        async function fetchCommunes() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/S450R1/algeria-cities-2025/main/json/cities.json');
                const data = await response.json();
                allCommunes = data.communes;
            } catch (error) {
                console.error("Error fetching communes:", error);
            }
        }

        // Update Communes on Wilaya Change
        wilayaSelect.addEventListener('change', () => {
            const selectedWilayaName = wilayaSelect.value;
            communeSelect.innerHTML = '<option value="">Select Region</option>';

            if (!selectedWilayaName) return;

            const wilayaId = Object.keys(wilayasData).find(key => wilayasData[key].name === selectedWilayaName);

            if (allCommunes.length > 0 && wilayaId) {
                const filtered = allCommunes.filter(c => c.wilaya_id == wilayaId);
                filtered.sort((a, b) => a.commune_name_latin.localeCompare(b.commune_name_latin));
                filtered.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.commune_name_latin;
                    option.textContent = `${c.commune_name_latin} (${c.commune_name_arabic})`;
                    communeSelect.appendChild(option);
                });
            }
        });

        fetchCommunes();

        let currentProduct = null;

        // ✅ FIXED: Load product without placeholder image flash
        async function loadProduct() {
            try {
                const product = await getProductById(productId);
                
                if (!product) {
                    alert('Product not found!');
                    window.location.href = 'index.html';
                    return;
                }
                
                currentProduct = product;

                // Update text content
                productTitle.textContent = product.name;
                productTitle.classList.remove('skeleton');
                
                productPrice.textContent = formatPrice(product.price);
                productPrice.classList.remove('skeleton');
                
                productDescription.textContent = product.description || 'No description available.';
                
                breadcrumbCategory.textContent = product.category;
                breadcrumbTitle.textContent = product.name;
                stockStatus.textContent = 'In Stock • Ready for Delivery';
                
                document.title = `${product.name} | Phone Haven`;

                // ✅ Load image properly - hide skeleton, show real image
                if (product.image) {
                    const img = new Image();
                    img.onload = () => {
                        // Hide skeleton
                        imageSkeleton.classList.add('hidden');
                        // Set real image src and show it
                        productImage.src = product.image;
                        productImage.classList.remove('hidden');
                        // Trigger fade-in
                        setTimeout(() => productImage.classList.add('loaded'), 50);
                    };
                    img.onerror = () => {
                        imageSkeleton.classList.add('hidden');
                        productImage.src = 'https://images.unsplash.com/photo-1560343090-f0409e92791a?w=800&q=80';
                        productImage.classList.remove('hidden');
                        productImage.classList.add('loaded');
                    };
                    img.src = product.image;
                } else {
                    imageSkeleton.classList.add('hidden');
                    productImage.classList.remove('hidden');
                    productImage.classList.add('loaded');
                }

            } catch (error) {
                console.error("Error loading product:", error);
                // Hide skeleton on error
                imageSkeleton.classList.add('hidden');
                productImage.classList.remove('hidden');
                productImage.classList.add('loaded');
                alert('Error loading product. Check console.');
            }
        }

        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentProduct) return;

            confirmBtn.disabled = true;
            const btnSpan = confirmBtn.querySelector('span');
            const originalText = btnSpan.textContent;
            btnSpan.textContent = "Processing...";

            const order = {
                customerName: document.getElementById('customer-name').value,
                customerPhone: document.getElementById('customer-phone').value,
                shippingType: document.getElementById('shipping-type').value,
                wilaya: document.getElementById('wilaya').value,
                commune: document.getElementById('commune').value,
                address: document.getElementById('address').value,
                productId: currentProduct.id,
                productName: currentProduct.name,
                total: currentProduct.price,
                status: 'Pending',
                createdAt: new Date()
            };

            try {
                const docRef = await addOrder(order);
                window.location.href = `success.html?id=${docRef.id}`;
            } catch (error) {
                console.error("Error creating order:", error);
                alert('Erreur lors de la confirmation. Veuillez réessayer.');
                confirmBtn.disabled = false;
                btnSpan.textContent = originalText;
            }
        });

        // Initialize
        loadProduct();
    </script>
</body>

</html>
