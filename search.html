<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Catalogue | Phone Haven</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1",
                        "accent": "#f59e0b",
                        "background-light": "#ffffff",
                        "background-dark": "#020617",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "3xl": "1.5rem",
                        "4xl": "2rem",
                    },
                },
            },
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-body text-slate-900 dark:text-slate-100 selection:bg-primary/30">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Premium Navigation -->
        <header
            class="sticky top-0 z-[100] w-full border-b border-white/5 bg-white/70 dark:bg-background-dark/70 backdrop-blur-xl px-6 md:px-20 py-4">
            <div class="mx-auto flex max-w-7xl items-center justify-between">
                <div class="flex items-center gap-10">
                    <a href="index.html" class="flex items-center gap-2 group">
                        <div
                            class="flex h-10 w-10 items-center justify-center rounded-2xl bg-white overflow-hidden shadow-lg group-hover:rotate-12 transition-transform duration-500">
                            <img src="images/logo.png" class="h-full w-full object-contain" alt="Phone Haven Logo">
                        </div>
                        <h2 class="font-display text-2xl font-black tracking-tighter text-slate-900 dark:text-white">
                            Phone Haven<span class="text-primary italic">.</span></h2>
                    </a>
                </div>
                <div class="flex-1 max-w-lg mx-12 hidden md:block">
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">search</span>
                        <input id="search-input"
                            class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-2xl py-3 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-slate-400"
                            placeholder="Rechercher smartphones, accessoires..." type="text" />
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button
                        class="flex h-10 w-10 items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-white/10 transition-all">
                        <span class="material-symbols-outlined text-[22px]">favorite</span>
                    </button>
                    <button
                        class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-white shadow-lg shadow-primary/20 transition-all active:scale-95">
                        <span class="material-symbols-outlined text-[22px]">shopping_bag</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="mx-auto w-full max-w-7xl flex-1 px-6 py-12 md:px-20">
            <!-- Breadcrumbs -->
            <nav class="flex items-center gap-3 mb-12 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                <a class="hover:text-primary transition-colors" href="index.html">Atelier</a>
                <span class="h-1 w-1 rounded-full bg-slate-300"></span>
                <span class="text-primary font-black">Collection</span>
            </nav>

            <div class="mb-16">
                <div class="flex items-center gap-2 text-accent mb-4">
                    <span class="material-symbols-outlined text-sm font-bold fill-1">layers</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Archive Discovery</span>
                </div>
                <h1 id="search-title"
                    class="font-display text-4xl md:text-5xl font-black tracking-tighter text-slate-900 dark:text-white mb-4">
                    Tous les Produits</h1>
                <p id="result-count" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Chargement du
                    catalogue...</p>
            </div>

            <div class="flex flex-col lg:flex-row gap-16">
                <!-- Sidebar Filters -->
                <aside class="w-full lg:w-72 shrink-0">
                    <div class="sticky top-32 space-y-12">
                        <div>
                            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6">Categories
                            </h3>
                            <div class="space-y-2" id="category-filters">
                                <button
                                    class="w-full flex items-center justify-between p-4 rounded-2xl bg-primary text-white font-black group transition-all"
                                    data-category="All">
                                    <span class="text-xs uppercase tracking-widest">Tous les Produits</span>
                                    <span class="material-symbols-outlined text-sm">chevron_right</span>
                                </button>
                                <button
                                    class="w-full flex items-center justify-between p-4 rounded-2xl bg-slate-50 dark:bg-white/5 text-slate-500 hover:bg-slate-100 dark:hover:bg-white/10 font-bold group transition-all"
                                    data-category="Téléphone">
                                    <span class="text-xs uppercase tracking-widest">Téléphone</span>
                                    <span
                                        class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
                                </button>
                                <button
                                    class="w-full flex items-center justify-between p-4 rounded-2xl bg-slate-50 dark:bg-white/5 text-slate-500 hover:bg-slate-100 dark:hover:bg-white/10 font-bold group transition-all"
                                    data-category="Accessoire">
                                    <span class="text-xs uppercase tracking-widest">Accessoire</span>
                                    <span
                                        class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
                                </button>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6">
                                Inspiration</h3>
                            <div class="glass p-6 rounded-3xl border border-white/5 text-center">
                                <p class="text-xs font-bold text-slate-500 leading-relaxed mb-4 italic">"True minimalism
                                    is not the absence of something. It's the perfect amount of something."</p>
                                <div class="h-0.5 w-8 bg-primary/30 mx-auto"></div>
                            </div>
                        </div>
                    </div>
                </aside>
                <!-- Product Grid -->
                <div class="grow">
                    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-x-8 gap-y-16" id="product-grid">
                        <!-- Products will be loaded here -->
                    </div>

                    <!-- Pagination -->
                    <div class="mt-32 flex items-center justify-center border-t border-white/5 pt-12">
                        <nav class="flex items-center gap-4">
                            <button
                                class="flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-50 dark:bg-white/5 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">chevron_left</span>
                            </button>
                            <div class="flex items-center gap-2">
                                <button
                                    class="h-12 w-12 rounded-2xl bg-primary text-white font-black text-xs">01</button>
                                <button
                                    class="h-12 w-12 rounded-2xl bg-slate-50 dark:bg-white/5 text-slate-400 font-bold text-xs hover:text-primary transition-colors">02</button>
                            </div>
                            <button
                                class="flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-50 dark:bg-white/5 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">chevron_right</span>
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-white dark:bg-background-dark border-t border-white/5 py-20 mt-32">
            <div class="mx-auto max-w-7xl px-6 md:px-20 text-center">
                <a href="index.html" class="inline-flex items-center gap-2 group mb-12">
                    <div
                        class="flex h-10 w-10 items-center justify-center rounded-2xl bg-white overflow-hidden shadow-lg">
                        <img src="images/logo.png" class="h-full w-full object-contain" alt="Phone Haven Logo">
                    </div>
                    <h2 class="font-display text-2xl font-black tracking-tighter text-slate-900 dark:text-white">Phone
                        Haven<span class="text-primary italic">.</span></h2>
                </a>
                <div
                    class="flex flex-wrap justify-center gap-10 mb-12 text-sm font-black uppercase tracking-widest text-slate-400">
                    <a class="hover:text-primary transition-colors" href="index.html">Atelier</a>
                    <a class="hover:text-primary transition-colors" href="search.html">Collection</a>
                    <a class="hover:text-primary transition-colors" href="tracking.html">Track Parcel</a>
                    <a class="hover:text-primary transition-colors" href="#">Support</a>
                </div>
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">© 2024 Phone Haven</p>
            </div>
        </footer>
    </div>
    <script type="module">
        import { getProducts } from './db-service.js';

        const productGrid = document.getElementById('product-grid');
        const searchInput = document.getElementById('search-input');
        const searchTitle = document.getElementById('search-title');
        const resultCount = document.getElementById('result-count');
        const categoryFilters = document.getElementById('category-filters');

        let allProducts = [];
        let currentCategory = 'All';

        function formatPrice(price) {
            return new Intl.NumberFormat('fr-DZ').format(price) + ' د.ج';
        }

        async function loadSearchProducts() {
            try {
                allProducts = await getProducts();
                filterAndRender();
            } catch (error) {
                console.error("Error loading products:", error);
                productGrid.innerHTML = '<div class="col-span-full py-20 text-center text-red-500 font-bold uppercase tracking-widest text-xs">System Error: Archive Unavailable</div>';
            }
        }

        function filterAndRender() {
            const query = searchInput.value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query) || p.description.toLowerCase().includes(query);
                const matchesCategory = currentCategory === 'All' || p.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            renderProducts(filtered);

            resultCount.textContent = `${filtered.length} PRODUIT(S) TROUVÉ(S)`;
            if (query) {
                searchTitle.textContent = `Résultats pour "${query}"`;
            } else if (currentCategory !== 'All') {
                searchTitle.textContent = `${currentCategory}`;
            } else {
                searchTitle.textContent = 'Tous les Produits';
            }
        }

        function renderProducts(products) {
            if (products.length === 0) {
                productGrid.innerHTML = '<div class="col-span-full py-20 text-center text-slate-500 font-black uppercase tracking-widest text-xs">No matching pieces in the archive</div>';
                return;
            }

            productGrid.innerHTML = '';
            products.forEach(product => {
                const div = document.createElement('div');
                div.className = 'group relative flex flex-col cursor-pointer';
                div.onclick = () => window.location.href = `product.html?id=${product.id}`;
                div.innerHTML = `
                    <div class="aspect-square w-full overflow-hidden rounded-[2.5rem] bg-slate-50 dark:bg-white/5 border border-white/5 shadow-2xl relative">
                        <img src="${product.image || 'https://images.unsplash.com/photo-1560343090-f0409e92791a?w=400&q=80'}" class="h-full w-full object-cover transition-transform duration-1000 group-hover:scale-105" alt="${product.name}">
                        <div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="absolute bottom-6 left-6 right-6 translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-500">
                             <div class="glass p-4 rounded-2xl flex items-center justify-between">
                                <span class="text-[10px] font-black uppercase tracking-widest text-white">Inspect Details</span>
                                <span class="material-symbols-outlined text-white text-sm">visibility</span>
                             </div>
                        </div>
                    </div>
                    <div class="mt-8 px-2">
                        <p class="text-[10px] font-black text-primary uppercase tracking-[0.2em] mb-2">${product.category}</p>
                        <h3 class="font-display text-xl font-black text-slate-900 dark:text-white mb-2 leading-tight">${product.name}</h3>
                        <p class="text-lg font-display font-medium text-slate-400">${formatPrice(product.price)}</p>
                    </div>
                `;
                productGrid.appendChild(div);
            });
        }

        searchInput.addEventListener('input', filterAndRender);

        categoryFilters.addEventListener('click', (e) => {
            const button = e.target.closest('button');
            if (button) {
                currentCategory = button.dataset.category;

                // Update UI active state
                categoryFilters.querySelectorAll('button').forEach(btn => {
                    btn.className = 'w-full flex items-center justify-between p-4 rounded-2xl bg-slate-50 dark:bg-white/5 text-slate-500 hover:bg-slate-100 dark:hover:bg-white/10 font-bold group transition-all';
                    const icon = btn.querySelector('.material-symbols-outlined');
                    if (icon) icon.className = 'material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity';
                });

                button.className = 'w-full flex items-center justify-between p-4 rounded-2xl bg-primary text-white font-black group transition-all';
                const icon = button.querySelector('.material-symbols-outlined');
                if (icon) icon.className = 'material-symbols-outlined text-sm';

                filterAndRender();
            }
        });

        // Initialize from URL query if present
        const urlParams = new URL(window.location.href).searchParams;
        if (urlParams.has('q')) {
            searchInput.value = urlParams.get('q');
        }

        loadSearchProducts();
    </script>
</body>

</html>
