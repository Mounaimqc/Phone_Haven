<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <script src="auth-gate.js"></script>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BladiShop / Logistics Terminal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1",
                        "terminal-black": "#020617",
                        "terminal-card": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .terminal-border { border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-display { font-family: 'Outfit', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .active-nav { background: rgba(255, 255, 255, 0.05); border-left: 3px solid #6366f1; color: white !important; }
    </style>
</head>
<body class="selection:bg-primary/30 antialiased overflow-hidden h-screen">
    <div class="flex h-full w-full">
        <!-- Sidebar: High Contrast Terminal -->
        <aside class="w-72 bg-black border-r terminal-border flex flex-col z-20">
            <div class="p-8">
                <div class="flex items-center gap-3 mb-10">
                    <div class="size-10 bg-white rounded-xl flex items-center justify-center overflow-hidden shadow-lg rotate-3">
                        <img src="images/logo.png" class="h-full w-full object-contain" alt="BladiShop Logo">
                    </div>
                    <div>
                        <h1 class="font-display font-black text-white text-lg tracking-tighter">BladiShop<span class="text-primary italic">.</span>Terminal</h1>
                        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500">Logistics Node Alpha</p>
                    </div>
                </div>

                <nav class="space-y-1">
                    <a href="admin-analytics.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all group">
                        <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">grid_view</span>
                        <span class="text-xs font-black uppercase tracking-widest">Dashboard</span>
                    </a>
                    <a href="admin-orders.html" class="flex items-center gap-4 px-4 py-3 active-nav rounded-xl transition-all group">
                        <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">inventory</span>
                        <span class="text-xs font-black uppercase tracking-widest">Orders</span>
                    </a>
                    <a href="admin-products.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all group">
                        <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">layers</span>
                        <span class="text-xs font-black uppercase tracking-widest">Collection</span>
                    </a>
                    <a href="admin-reports.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all group">
                        <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">monitoring</span>
                        <span class="text-xs font-black uppercase tracking-widest">Analytics</span>
                    </a>
                </nav>
            </div>

            <div class="mt-auto p-8 border-t terminal-border bg-slate-900/50">
                <div class="flex items-center gap-4 mb-6">
                    <div class="size-10 rounded-full border terminal-border overflow-hidden p-0.5">
                        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlBOHA1KDmnNYWlhspgAoy9iDBlC33WWmN2Hii2YVikpWHz1rP8LG2Ppbu5tygofleHcZ4UsvGZifJVV4EO7UoswaQiAfgaOupabg9T1ZdmZx13-du-DJH9BAoqspjThxco2hLaInoRcUsIC_F1NoQ1-gxwtxB4OvRwWoW40ZQ89JE-RRozYipQOue5vRgdhxT5tCI5h4E5Mykk9BMp6L7XTzrJv_wQ2TbZfIA7Me4jbNdKQSztFdKHDLHA3INH0hVOUbE0umSjQ" class="w-full h-full object-cover rounded-full">
                    </div>
                    <div>
                        <p class="text-xs font-black text-white">Administrator</p>
                        <p class="text-[9px] font-black uppercase tracking-widest text-primary">Authorized</p>
                    </div>
                </div>
                <a href="index.html" class="flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-white/5 text-slate-400 text-[10px] font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all">
                    <span class="material-symbols-outlined text-sm">exit_to_app</span>
                    Lock Session
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col bg-terminal-black relative overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(99,102,241,0.05),transparent)] pointer-events-none"></div>
            
            <!-- Header -->
            <header class="h-20 border-b terminal-border px-10 flex items-center justify-between sticky top-0 z-10 glass">
                <div class="flex items-center gap-6">
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-white transition-colors">search</span>
                        <input type="text" placeholder="QUERY LOGISTICS DATA..." class="w-96 bg-white/5 border terminal-border rounded-xl pl-12 pr-4 py-2.5 text-[10px] font-black uppercase tracking-widest text-white placeholder:text-slate-600 focus:ring-0 focus:border-primary/50 transition-all">
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <button class="size-12 rounded-xl bg-white/5 flex items-center justify-center text-slate-400 hover:text-white transition-all relative">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="absolute top-3 right-3 size-2 bg-primary rounded-full border-2 border-terminal-black"></span>
                    </button>
                    <button class="h-12 px-6 bg-white text-black text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-primary hover:text-white transition-all shadow-2xl shadow-white/5 active:scale-95">
                        Initiate Order
                    </button>
                </div>
            </header>

            <!-- Table View -->
            <div class="p-10 flex-1 flex flex-col overflow-y-auto">
                <div class="mb-10 flex items-end justify-between">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="size-1.5 rounded-full bg-primary animate-pulse"></span>
                            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-primary">Real-time Stream</span>
                        </div>
                        <h2 class="font-display text-4xl font-black text-white tracking-tighter">Orders Ledger</h2>
                    </div>
                    <div class="flex gap-4">
                        <button class="h-10 px-4 glass rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">Filter</button>
                        <button class="h-10 px-4 glass rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">Export CVS</button>
                    </div>
                </div>

                <!-- Table Container -->
                <div class="bg-black/40 rounded-3xl terminal-border overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/5 border-b terminal-border">
                                <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Signature</th>
                                <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Client</th>
                                <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Timeline</th>
                                <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Value</th>
                                <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">State</th>
                                <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400"></th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body" class="divide-y terminal-border">
                            <!-- Data injection -->
                        </tbody>
                    </table>
                </div>

                <div class="mt-8 flex items-center justify-between">
                    <p id="order-count" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Loading node entries...</p>
                    <div class="flex gap-2">
                        <button class="size-8 glass rounded-lg text-slate-400 hover:bg-white hover:text-black flex items-center justify-center transition-all"><span class="material-symbols-outlined text-sm">west</span></button>
                        <button class="size-8 glass rounded-lg text-slate-400 hover:bg-white hover:text-black flex items-center justify-center transition-all"><span class="material-symbols-outlined text-sm">east</span></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { getOrders } from './db-service.js';

        const tableBody = document.getElementById('orders-table-body');
        const orderCount = document.getElementById('order-count');

        function formatPrice(price) {
            return new Intl.NumberFormat('fr-DZ').format(price) + ' د.ج';
        }

        async function loadOrders() {
            tableBody.innerHTML = '<tr><td colspan="6" class="px-8 py-20 text-center text-slate-500 uppercase font-black text-[10px] tracking-widest pulse">Accessing ledger...</td></tr>';
            try {
                const orders = await getOrders();
                renderOrders(orders);
            } catch (error) {
                console.error("Error loading orders:", error);
                tableBody.innerHTML = '<tr><td colspan="6" class="px-8 py-20 text-center text-red-500 font-black text-[10px] tracking-[0.3em]">Ledger Access Denied: Check Protocol</td></tr>';
            }
        }

        function renderOrders(orders) {
            if (orders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-8 py-20 text-center text-slate-600 font-black text-[10px] tracking-widest uppercase">Void: No transaction data detected</td></tr>';
                orderCount.textContent = 'LEGER EMPTY';
                return;
            }

            tableBody.innerHTML = '';
            orders.forEach(order => {
                const tr = document.createElement('tr');
                tr.className = 'group hover:bg-white/5 transition-all cursor-pointer';
                tr.onclick = () => window.location.href = `admin-order-details.html?id=${order.id}`;
                
                const date = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleDateString('fr-DZ') : 'N/A';
                
                const statusStyles = {
                    'Delivered': 'text-emerald-400 border-emerald-400/20 bg-emerald-400/5',
                    'Shipped': 'text-blue-400 border-blue-400/20 bg-blue-400/5',
                    'Pending': 'text-amber-400 border-amber-400/20 bg-amber-400/5',
                    'Cancelled': 'text-rose-400 border-rose-400/20 bg-rose-400/5'
                };

                tr.innerHTML = `
                    <td class="px-8 py-6 text-xs font-black text-white uppercase tracking-widest">
                        <span class="text-slate-600">ID_</span> ${order.id.substring(0, 8).toUpperCase()}
                    </td>
                    <td class="px-8 py-6">
                        <div class="flex items-center gap-3">
                            <div class="size-8 rounded-lg border terminal-border flex items-center justify-center text-[10px] font-black bg-white/5 text-white">
                                ${order.customerName ? order.customerName.charAt(0) : '?'}
                            </div>
                            <span class="text-xs font-bold text-white tracking-wide">${order.customerName || 'Anonymous'}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-[10px] font-medium text-slate-400 uppercase tracking-widest">${date}</td>
                    <td class="px-8 py-6 text-xs font-black text-white">${formatPrice(order.total)}</td>
                    <td class="px-8 py-6">
                        <span class="px-3 py-1 rounded-md border text-[9px] font-black uppercase tracking-[0.2em] ${statusStyles[order.status] || 'text-slate-400 border-white/10'}">
                            ${order.status}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-right">
                        <button class="text-slate-500 group-hover:text-white transition-colors">
                            <span class="material-symbols-outlined text-sm">open_in_new</span>
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            orderCount.textContent = `SYSTEM ANALYTICS: ${orders.length} ENTRIES VERIFIED`;
        }

        loadOrders();
    </script>
</body>
</html>
